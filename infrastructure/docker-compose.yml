version: '3.8'

services:
  db:
    image: postgres:15
    container_name: priocardix-db
    restart: always
    environment:
      POSTGRES_USER: priocardix_admin
      POSTGRES_PASSWORD: guardian_password
      POSTGRES_DB: priocardix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  ml-engine:
    build: ../services/ml-service
    container_name: priocardix-ml-engine
    ports:
      - "8000:8000"
    volumes:
      - ../services/ml-service:/app

  intervention-engine:
    build: ../services/intervention
    container_name: priocardix-intervention-engine
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://priocardix_admin:guardian_password@db:5432/priocardix_db
    ports:
      - "3001:3001"
    volumes:
      - ../services/intervention:/app

  analytics-hub:
    build: ../services/analytics
    container_name: priocardix-analytics-hub
    ports:
      - "3002:3002"
    volumes:
      - ../services/analytics:/app

  alert-hub:
    build: ../services/alerts
    container_name: priocardix-alert-hub
    ports:
      - "3003:3003"
    volumes:
      - ../services/alerts:/app

  gateway:
    build: ../services/gateway
    container_name: priocardix-gateway
    depends_on:
      - ml-engine
      - intervention-engine
      - analytics-hub
      - alert-hub
    ports:
      - "3000:3000"
    environment:
      ML_SERVICE_URL: http://ml-engine:8000
      INTERVENTION_SERVICE_URL: http://intervention-engine:3001
      ANALYTICS_SERVICE_URL: http://analytics-hub:3002
      ALERT_SERVICE_URL: http://alert-hub:3003

volumes:
  postgres_data:
